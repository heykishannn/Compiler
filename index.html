<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeForge IDE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/lint.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/brace-fold.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/xml-fold.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/html-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/css-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/searchcursor.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/javascript-lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/css-lint.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--panel:#13161e;--panel2:#1a1e29;--border:#252a38;
  --accent:#00e5ff;--accent2:#7c3aed;--red:#ef4444;--green:#10b981;--amber:#f59e0b;
  --text:#e2e8f0;--text2:#64748b;--text3:#94a3b8;
  --sw:220px;--th:50px;--tbh:40px;--sbh:26px;
  --mono:'JetBrains Mono',monospace;--ui:'Syne',sans-serif
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ui)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* ══ CODEMIRROR CUSTOM THEME ══ */
.CodeMirror{
  height:100%!important;font-family:var(--mono)!important;
  font-size:13px!important;line-height:1.7!important;background:#0d0f14!important;color:#abb2bf!important
}
.CodeMirror-gutters{background:#13161e!important;border-right:1px solid #252a38!important;width:52px!important}
.CodeMirror-linenumber{color:#4b5563!important;padding:0 10px 0 6px!important;font-size:11px!important}
.CodeMirror-cursor{border-left:2px solid #00e5ff!important}
.CodeMirror-selected{background:rgba(0,229,255,.13)!important}
.CodeMirror-activeline-background{background:rgba(255,255,255,.025)!important}
.CodeMirror-matchingbracket{color:#00e5ff!important;outline:1px solid #00e5ff;border-radius:2px}
.CodeMirror-scroll{padding-bottom:40px}
.CodeMirror-foldgutter-open,.CodeMirror-foldgutter-folded{color:#4b5563;cursor:pointer;font-size:11px;padding:0 2px}
/* Syntax colors */
.cm-s-codeforge .cm-keyword{color:#c678dd!important}
.cm-s-codeforge .cm-def{color:#61afef!important}
.cm-s-codeforge .cm-variable{color:#e06c75!important}
.cm-s-codeforge .cm-variable-2{color:#e5c07b!important}
.cm-s-codeforge .cm-variable-3{color:#56b6c2!important}
.cm-s-codeforge .cm-string{color:#98c379!important}
.cm-s-codeforge .cm-string-2{color:#98c379!important}
.cm-s-codeforge .cm-number{color:#d19a66!important}
.cm-s-codeforge .cm-comment{color:#5c6370!important;font-style:italic!important}
.cm-s-codeforge .cm-operator{color:#56b6c2!important}
.cm-s-codeforge .cm-punctuation{color:#abb2bf!important}
.cm-s-codeforge .cm-atom{color:#d19a66!important}
.cm-s-codeforge .cm-property{color:#e06c75!important}
.cm-s-codeforge .cm-qualifier{color:#e5c07b!important}
.cm-s-codeforge .cm-tag{color:#e06c75!important}
.cm-s-codeforge .cm-attribute{color:#e5c07b!important}
.cm-s-codeforge .cm-bracket{color:#abb2bf!important}
.cm-s-codeforge .cm-builtin{color:#e5c07b!important}
.cm-s-codeforge .cm-callee{color:#61afef!important}
.cm-s-codeforge .cm-error{color:#ff5555!important;background:rgba(255,85,85,.12)!important;border-bottom:2px wavy #ff5555}
.cm-s-codeforge .cm-m-css.cm-property{color:#56b6c2!important}
.cm-s-codeforge .cm-m-css.cm-value{color:#98c379!important}
.cm-s-codeforge .cm-m-css.cm-atom{color:#d19a66!important}
.cm-s-codeforge .cm-m-css.cm-keyword{color:#c678dd!important}
.cm-s-codeforge .cm-m-css.cm-tag{color:#e06c75!important}
.cm-s-codeforge .cm-m-xml.cm-tag{color:#e06c75!important}
.cm-s-codeforge .cm-m-xml.cm-attribute{color:#e5c07b!important}

.cm-error-gutter{color:#ef4444;font-size:11px;line-height:1.7;padding-left:2px;cursor:pointer}
.CodeMirror-lint-marker-error,.CodeMirror-lint-marker-warning{display:none}

/* ══ TOOLBAR ══ */
#toolbar{
  height:var(--th);display:flex;align-items:center;gap:4px;
  padding:0 10px;background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:100;overflow-x:auto
}
#toolbar::-webkit-scrollbar{height:0}
#mob-menu-btn{display:none;padding:5px}
#mob-menu-btn svg{width:16px;height:16px}
#logo{font-size:16px;font-weight:800;letter-spacing:-.5px;margin-right:6px;white-space:nowrap;flex-shrink:0}
#logo span{color:var(--accent)}
.sep{width:1px;height:22px;background:var(--border);margin:0 2px;flex-shrink:0}
.tbtn{
  display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;
  border:none;cursor:pointer;font-family:var(--ui);font-size:11px;font-weight:600;
  transition:all .15s;white-space:nowrap;flex-shrink:0;
  background:var(--panel2);color:var(--text3)
}
.tbtn:hover{background:var(--border);color:var(--text)}
.tbtn.pri{background:var(--accent);color:#000}
.tbtn.pri:hover{filter:brightness(1.1)}
.tbtn svg{width:13px;height:13px;flex-shrink:0}
.mgrp{display:flex;gap:3px;flex-shrink:0}
.mbtn{
  padding:5px 9px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text2);cursor:pointer;
  font-family:var(--ui);font-size:11px;font-weight:600;transition:all .15s;white-space:nowrap
}
.mbtn.on{background:var(--accent2);border-color:var(--accent2);color:#fff}
#arl{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);cursor:pointer;white-space:nowrap;flex-shrink:0}
#arl input{accent-color:var(--accent)}

/* ══ APP ══ */
#app{display:flex;height:calc(100vh - var(--th) - var(--sbh));position:relative}

/* ══ SIDEBAR ══ */
#sidebar{width:var(--sw);flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sbhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--text2);text-transform:uppercase}
#sbacts{display:flex;gap:3px}
.sbibtn{width:24px;height:24px;border-radius:5px;border:none;cursor:pointer;background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.sbibtn:hover{background:var(--border);color:var(--text)}
.sbibtn svg{width:13px;height:13px}
#ftree{flex:1;overflow-y:auto;padding:6px 0}
.fold-item{user-select:none}
.fold-lbl{display:flex;align-items:center;gap:6px;padding:4px 10px;font-size:12px;color:var(--text3);cursor:pointer;border-radius:4px;margin:1px 4px;transition:background .1s}
.fold-lbl:hover{background:var(--panel2)}
.carrow{display:inline-block;transition:transform .15s;font-size:9px;font-style:normal}
.fold-lbl.open .carrow{transform:rotate(90deg)}
.fold-kids{padding-left:14px;display:none}
.fold-kids.open{display:block}
.fi{display:flex;align-items:center;gap:7px;padding:4px 10px;font-size:12px;color:var(--text3);cursor:pointer;border-radius:4px;margin:1px 4px;transition:background .1s;font-family:var(--mono)}
.fi:hover{background:var(--panel2);color:var(--text)}
.fi.act{background:rgba(0,229,255,.08);color:var(--accent)}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.facts{margin-left:auto;display:none;gap:2px}
.fi:hover .facts{display:flex}
.fabt{width:20px;height:20px;border-radius:3px;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .1s}
.fabt:hover{background:var(--border);color:var(--text)}

/* ══ CENTER ══ */
#center{flex:1;display:flex;flex-direction:column;min-width:0}
#tabbar{height:var(--tbh);display:flex;align-items:flex-end;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
#tabbar::-webkit-scrollbar{height:3px}
.tab{display:flex;align-items:center;gap:7px;padding:0 12px;height:36px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-family:var(--mono);color:var(--text2);background:var(--panel2);border:1px solid var(--border);border-bottom:none;margin:0 2px;flex-shrink:0;transition:all .15s;position:relative}
.tab:hover{color:var(--text)}
.tab.act{background:var(--bg);color:var(--text)}
.tab.act::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--bg)}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tcls{width:15px;height:15px;border-radius:3px;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .1s}
.tcls:hover{background:var(--border);color:var(--red)}
.tab.has-err .tdot{box-shadow:0 0 0 2px var(--red)}
.tab.has-warn .tdot{box-shadow:0 0 0 2px var(--amber)}

/* ══ SPLIT ══ */
#ep{flex:1;display:flex;min-height:0}
#edpane{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--border)}
#edcon{flex:1;min-height:0;position:relative;overflow:hidden}
.edinst{position:absolute;inset:0;display:none}
.edinst.act{display:block}
.edinst>.CodeMirror{position:absolute;inset:0;width:100%;height:100%!important}

.media-view{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--panel2);color:var(--text2);overflow:auto;padding:20px;font-family:var(--mono);font-size:13px}
.media-view img,.media-view video{max-width:90%;max-height:65%;border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.media-view audio{width:280px}

#dh{width:4px;cursor:col-resize;background:var(--border);flex-shrink:0;transition:background .15s}
#dh:hover,#dh.drag{background:var(--accent)}

/* ══ PREVIEW PANE ══ */
#pvpane{flex:0 0 50%;display:flex;flex-direction:column;min-width:180px;background:var(--bg)}
#pvhdr{height:var(--tbh);display:flex;align-items:center;gap:8px;padding:0 10px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.phdots{display:flex;gap:5px}
.phdot{width:10px;height:10px;border-radius:50%}
#pvurl{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:3px 10px;font-size:11px;color:var(--text2);font-family:var(--mono);outline:none;pointer-events:none}

/* ══ PREVIEW WRAP ══ */
#pvwrap{flex:1;position:relative}

/* Fixed PC mode wrapper for proper scaling */
#pvwrap.pc{background:#fff;display:block;overflow:hidden;} 
#pvwrap.pc #pcfw{display:block;border:none;}
#pvwrap.pc #pcfw iframe{width:100%;height:100%;border:none;display:block}

/* Android mode */
#pvwrap.android{
  background:radial-gradient(ellipse at center,#1a1035 0%,#0a0a14 100%);
  display:block; padding-top:40px; text-align:center; overflow-y:auto;
}
.aphone{
  display:inline-block;width:375px;
  background:linear-gradient(145deg,#1e1e2e,#16162a);
  border-radius:44px;
  box-shadow:0 0 0 1px #3a3a5a,0 0 0 3px #111,0 0 0 5px #2a2a4a,0 50px 120px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.05);
  padding:16px 12px 12px;
  vertical-align:top;
  margin-bottom: 40px;
}
.anotch{display:flex;justify-content:center;align-items:center;padding:5px 0 10px;gap:8px}
.acam{width:10px;height:10px;background:#0a0a12;border-radius:50%;border:1px solid #2a2a3a;box-shadow:inset 0 0 4px rgba(0,229,255,.3)}
.aspeaker{width:50px;height:5px;background:#0a0a12;border-radius:99px;border:1px solid #2a2a3a}
.ascreen{
  width:100%;border-radius:28px;overflow:hidden;
  background:#fff;height:667px;position:relative;
  box-shadow:0 0 0 1px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.05)
}
.ascreen iframe{width:100%;height:100%;border:none;display:block;position:absolute;inset:0}
.ahome{display:flex;justify-content:center;align-items:center;padding:10px 0 5px}
.ahpill{width:110px;height:4px;background:linear-gradient(90deg,transparent,#444,transparent);border-radius:99px}
.abtns{display:flex;justify-content:space-around;padding:0 20px 4px;gap:8px}
.abtn{flex:1;height:3px;background:#2a2a4a;border-radius:99px}

/* ══ FULLSCREEN OVERLAY ══ */
#fsov{display:none;position:fixed;inset:0;z-index:9000;flex-direction:column;background:#0d0f14}
#fsov.on{display:flex}
#fstb{
  height:46px;display:flex;align-items:center;gap:8px;
  padding:0 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0
}
#fs-urlbar-wrap{
  flex:1;display:flex;align-items:center;gap:6px;
  background:#0a0c12;border:1px solid var(--border);border-radius:8px;
  padding:0 10px;height:30px;max-width:600px;margin:0 auto
}
#fs-urlbar-wrap svg{width:12px;height:12px;color:var(--green);flex-shrink:0}
#fs-urlbar{background:transparent;border:none;outline:none;flex:1;font-family:var(--mono);font-size:11px;color:var(--text3)}
#fsright{display:flex;gap:6px;align-items:center;flex-shrink:0}
#fsbody{flex:1;}

#fsbody.fspc{background:#fff;display:block;overflow:hidden;position:relative;}
#fsbody.fspc iframe{display:block;border:none;}

#fsbody.fsand{
  background:radial-gradient(ellipse at center,#1a1035 0%,#0a0a14 100%);
  display:block;padding:30px 0 50px;text-align:center;overflow:auto;
}

/* ══ STATUS BAR ══ */
#sb{
  height:var(--sbh);display:flex;align-items:center;gap:12px;
  padding:0 14px;background:var(--accent2);
  font-size:11px;color:rgba(255,255,255,.8);font-weight:600;flex-shrink:0;user-select:none
}
#sb .sbr{margin-left:auto;display:flex;gap:12px}
#sbmsg{color:#fff}
#err-count{
  display:none;background:var(--red);color:#fff;border-radius:99px;
  padding:1px 7px;font-size:10px;font-weight:700
}
#err-count.show{display:inline-block}
#warn-count{
  display:none;background:var(--amber);color:#000;border-radius:99px;
  padding:1px 7px;font-size:10px;font-weight:700
}
#warn-count.show{display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.comp{animation:pulse .6s infinite}

/* ══ MODALS & TOAST ══ */
.movly{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:5000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.movly.hide{display:none}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;min-width:320px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal h3{font-size:15px;margin-bottom:14px;font-weight:700}
.modal input,.modal select{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;outline:none;margin-bottom:12px}
.modal input:focus{border-color:var(--accent)}
.macts{display:flex;gap:8px;justify-content:flex-end}
.macts .tbtn{padding:7px 16px}
#ctxmenu,#edctx{
  position:fixed;z-index:8000;background:var(--panel2);
  border:1px solid var(--border);border-radius:10px;padding:5px;
  box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);
  min-width:170px;display:none;backdrop-filter:blur(10px)
}
.cxi{
  display:flex;align-items:center;gap:10px;padding:8px 13px;border-radius:7px;cursor:pointer;
  font-size:12px;color:var(--text3);transition:all .1s
}
.cxi:hover{background:rgba(255,255,255,.07);color:var(--text)}
.cxi.danger:hover{background:rgba(239,68,68,.12);color:var(--red)}
.cxi .cxk{margin-left:auto;font-size:10px;color:var(--text2);font-family:var(--mono)}
.cxsep{height:1px;background:var(--border);margin:4px 0}
#edctx{min-width:180px}
#toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel2);border:1px solid var(--border);
  padding:8px 18px;border-radius:8px;font-size:12px;
  opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 30px rgba(0,0,0,.4)
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#err-panel{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(13,15,20,.95);border-top:1px solid var(--border);
  max-height:140px;overflow-y:auto;padding:8px;display:none;z-index:50
}
#err-panel.show{display:block}
.err-line{
  display:flex;align-items:flex-start;gap:8px;padding:4px 6px;border-radius:5px;
  font-size:11px;font-family:var(--mono);color:var(--text3);cursor:pointer;transition:background .1s
}
.err-line:hover{background:var(--panel2)}
.err-line .el{flex-shrink:0;font-weight:700}
.err-line .el.e{color:var(--red)}
.err-line .el.w{color:var(--amber)}

@media(max-width:768px){.tblbl{display:none}:root{--sw:180px}}

/* ══ MOBILE FIXES ══ */
@media(max-width:540px){
  #mob-menu-btn{display:flex!important}
  
  #sidebar{
    position:absolute;top:0;left:-260px;width:260px;
    height:100%;z-index:500;display:flex;transition:left 0.25s;
    box-shadow:4px 0 15px rgba(0,0,0,.6);
  }
  #sidebar.show{left:0}

  /* Make home screen vastly scrollable downwards */
  #center{display:block;overflow-y:auto;overflow-x:hidden}
  
  /* Adding 12vh extra padding ensures 10%+ extra scrollability after pvpane */
  #ep{display:flex;flex-direction:column;padding-bottom:12vh;height:auto}
  
  #edpane{height:60vh;flex:none;border-right:none}
  
  /* Mobile height is huge so phone model fits completely without internal cut off */
  #pvpane{height:900px;flex:none;border-top:1px solid var(--border)}
  
  #dh{display:none}
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tbtn" id="mob-menu-btn" onclick="toggleSidebar()" title="Menu">

<script>
'use strict';
// ═══════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════
const G={
  files:{},folders:{},tabs:[],active:null,
  autoRun:true,pvMode:'pc',fsMode:'pc',
  runTmr:null,blobUrls:{},html:'',
  cms:{}, errs:{} 
};

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
const uid=p=>p+(Date.now()%1e9)+(Math.random()*9999|0);
const ECLR={html:'#e34c26',htm:'#e34c26',css:'#264de4',js:'#f7df1e',json:'#10b981',ts:'#3178c6',jsx:'#61dafb',tsx:'#61dafb',md:'#64748b',txt:'#94a3b8',svg:'#ff6b6b',png:'#a855f7',jpg:'#a855f7',jpeg:'#a855f7',gif:'#a855f7',webp:'#a855f7',mp4:'#ef4444',mp3:'#f97316',wav:'#f97316',ogg:'#f97316'};
const MED=new Set(['png','jpg','jpeg','gif','webp','svg','mp4','mp3','wav','ogg','webm','pdf','ttf','woff','woff2']);
const E=n=>(n.split('.').pop()||'').toLowerCase();
const CLR=n=>ECLR[E(n)]||'#94a3b8';
const IMED=n=>MED.has(E(n));
const LANG=n=>({html:'HTML',htm:'HTML',css:'CSS',js:'JavaScript',ts:'TypeScript',json:'JSON',md:'Markdown',txt:'Text',jsx:'JSX',tsx:'TSX'}[E(n)]||E(n).toUpperCase()||'Text');
const FSZ=n=>n<1024?n+' B':n<1048576?(n/1024).toFixed(1)+' KB':(n/1048576).toFixed(1)+' MB';
const RE=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

function showToast(msg,d=2400){const t=qs('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function qs(s,ctx=document){return ctx.querySelector(s);}
function toggleSidebar(){qs('#sidebar').classList.toggle('show');} 

function cmMode(name){
  const e=E(name);
  if(['html','htm'].includes(e)) return 'htmlmixed';
  if(e==='css') return 'css';
  if(['js','jsx'].includes(e)) return {name:'javascript',json:false};
  if(['ts','tsx'].includes(e)) return {name:'javascript',typescript:true};
  if(e==='json') return {name:'javascript',json:true};
  return null;
}

function mkFile(name,content='',folder=null,blob=null,du=null){
  const id=uid('f');
  G.files[id]={id,name,content:IMED(name)?'':content,type:E(name),folder,isMedia:IMED(name),du,blob};
  if(blob) G.blobUrls[id]=URL.createObjectURL(blob);
  G.errs[id]={errors:0,warnings:0};
  return id;
}
function mkFolder(name){const id=uid('d');G.folders[id]={id,name,open:true};return id;}

function openTab(id){
  if(!G.tabs.includes(id))G.tabs.push(id);
  setActive(id);
  qs('#sidebar').classList.remove('show'); 
  saveData();
}
function closeTab(id,e){
  if(e)e.stopPropagation();
  const i=G.tabs.indexOf(id);if(i===-1)return;
  delete G.cms[id];
  const el=document.getElementById('ed-'+id);if(el)el.remove();
  G.tabs.splice(i,1);
  if(G.active===id)setActive(G.tabs[Math.max(0,i-1)]||null);
  renderTabs();
  saveData();
}
function setActive(id){
  G.active=id;
  document.querySelectorAll('.edinst').forEach(el=>el.classList.remove('act'));
  if(id){
    let el=document.getElementById('ed-'+id);
    if(!el)el=mkEditor(id);
    el.classList.add('act');
    setTimeout(()=>{if(G.cms[id])G.cms[id].refresh();},30);
  }
  renderTabs();renderTree();updateSB();sched();
  saveData();
}
function renderTabs(){
  const bar=qs('#tabbar');bar.innerHTML='';
  G.tabs.forEach(id=>{
    const f=G.files[id];if(!f)return;
    const ei=G.errs[id]||{errors:0,warnings:0};
    const t=document.createElement('div');
    t.className='tab'+(id===G.active?' act':'')+(ei.errors>0?' has-err':ei.warnings>0?' has-warn':'');
    t.innerHTML=`<span class="tdot" style="background:${CLR(f.name)}"></span><span>${f.name}</span><button class="tcls">✕</button>`;
    t.onclick=()=>setActive(id);
    t.querySelector('.tcls').onclick=e=>closeTab(id,e);
    bar.appendChild(t);
  });
}

// ═══════════════════════════════════════════════
//  EDITOR
// ═══════════════════════════════════════════════
function mkEditor(id){
  const f=G.files[id];
  const con=qs('#edcon');
  const inst=document.createElement('div');
  inst.className='edinst';inst.id='ed-'+id;

  if(f.isMedia){
    const e=E(f.name);
    const src=G.blobUrls[id]||f.du||'';
    let inner='';
    if(['png','jpg','jpeg','gif','webp','svg'].includes(e))inner=`<img src="${src}" alt="${f.name}">`;
    else if(['mp4','webm'].includes(e))inner=`<video src="${src}" controls></video>`;
    else if(['mp3','wav','ogg'].includes(e))inner=`<div style="font-size:52px">🎵</div><audio src="${src}" controls></audio>`;
    else inner=`<div style="font-size:48px">📎</div>`;
    inst.innerHTML=`<div class="media-view">${inner}<span style="opacity:.4">${f.name}</span></div>`;
    con.appendChild(inst);return inst;
  }

  const ta=document.createElement('textarea');
  ta.value=f.content;
  inst.appendChild(ta);
  con.appendChild(inst);

  const mode=cmMode(f.name);
  const cm=CodeMirror.fromTextArea(ta,{
    mode:mode||'null',
    theme:'codeforge',
    lineNumbers:true,lineWrapping:false,
    indentUnit:2,tabSize:2,indentWithTabs:false,
    autoCloseTags:true,autoCloseBrackets:true,
    styleActiveLine:true,
    inputStyle: 'contenteditable', // Select easily via touch
    spellcheck: false,             
    foldGutter:!!mode,
    gutters:['CodeMirror-linenumbers',mode?'CodeMirror-foldgutter':null].filter(Boolean),
    extraKeys:{
      'Tab':cm=>cm.execCommand('insertSoftTab'),
      'Ctrl-Enter':()=>runCode(),'Cmd-Enter':()=>runCode(),
      'Ctrl-S':()=>dlCurrent(),'Cmd-S':()=>dlCurrent(),
      'Ctrl-/':cm=>cm.execCommand('toggleComment'),
      'Ctrl-A':cm=>cm.execCommand('selectAll'),
    }
  });
  cm.setSize('100%','100%');

  cm.on('change',()=>{
    f.content=cm.getValue();
    lintFile(id,cm);
    updateSB();
    saveData();
    if(G.autoRun)sched();
  });
  cm.on('cursorActivity',updateSB);

  cm.getWrapperElement().addEventListener('contextmenu',e=>{
    e.preventDefault();
    showEdCtx(e,id,cm);
  });

  G.cms[id]=cm;
  return inst;
}

let _edctxCm=null;
function showEdCtx(e,id,cm){
  _edctxCm=cm;
  const m=qs('#edctx');
  m.style.display='block';
  m.style.left=Math.min(e.clientX,window.innerWidth-200)+'px';
  m.style.top=Math.min(e.clientY,window.innerHeight-280)+'px';
}
async function edCtxAct(act){
  closeAllMenus();
  const cm=_edctxCm;if(!cm)return;
  switch(act){
    case 'selectAll': cm.execCommand('selectAll');break;
    case 'cut':{
      const sel=cm.getSelection();
      if(sel){
        try{await navigator.clipboard.writeText(sel);}catch(_){}
        cm.replaceSelection('');
        showToast('Cut ✂️');
      }
    }break;
    case 'copy':{
      const sel=cm.getSelection()||cm.getValue();
      try{await navigator.clipboard.writeText(sel);showToast('Copied 📋');}catch(_){}
    }break;
    case 'paste':{
      try{
        const txt=await navigator.clipboard.readText();
        cm.replaceSelection(txt);
        showToast('Pasted 📌');
      }catch(_){showToast('Allow clipboard access first');}
    }break;
    case 'undo': cm.undo();break;
    case 'redo': cm.redo();break;
    case 'comment': cm.execCommand('toggleComment');break;
    case 'format': formatCode(cm);break;
  }
}
function formatCode(cm){
  const totalLines=cm.lineCount();
  for(let i=0;i<totalLines;i++){
    cm.indentLine(i,'smart');
  }
  showToast('Code formatted ✨');
}

function lintFile(id,cm){
  const f=G.files[id];
  if(!f)return;
  const code=cm.getValue();
  let errors=0,warnings=0;
  const markers=[];

  if(['js','ts','jsx','tsx'].includes(f.type)){
    try{new Function(code);}
    catch(err){
      errors++;
      const match=err.message.match(/line\s*(\d+)/i);
      const ln=match?parseInt(match[1])-1:0;
      markers.push({line:ln,msg:err.message,sev:'error'});
    }
    code.split('\n').forEach((line,i)=>{
      if(/console\.log/.test(line)){warnings++;markers.push({line:i,msg:'console.log() — remove before production',sev:'warn'});}
      if(/\bvar\s/.test(line)){warnings++;markers.push({line:i,msg:"'var' — use 'let' or 'const' instead",sev:'warn'});}
    });
  }

  G.errs[id]={errors,warnings};
  renderTabs();
  updateErrPanel(markers,cm);
  updateErrCounts();
}

function updateErrPanel(markers,cm){
  if(cm._errMarks){cm._errMarks.forEach(m=>{try{m.clear();}catch(_){}});}
  cm._errMarks=[];

  const panel=qs('#err-panel');
  if(!markers.length){panel.classList.remove('show');panel.innerHTML='';return;}
  panel.classList.add('show');
  panel.innerHTML=markers.map(m=>`
    <div class="err-line" onclick="gotoLine(${m.line})">
      <span class="el ${m.sev==='error'?'e':'w'}">${m.sev==='error'?'✖ Error':'⚠ Warn'}</span>
      <span>Line ${m.line+1}: ${m.msg}</span>
    </div>`).join('');

  markers.forEach(m=>{
    if(m.sev==='error'){
      try{
        const mark=cm.markText({line:m.line,ch:0},{line:m.line,ch:999},{className:'cm-error'});
        cm._errMarks.push(mark);
      }catch(_){}
    }
  });
}

function updateErrCounts(){
  let te=0,tw=0;
  Object.values(G.errs).forEach(e=>{te+=e.errors;tw+=e.warnings;});
  const ec=qs('#err-count'),wc=qs('#warn-count');
  ec.textContent=`${te} error${te!==1?'s':''}`;
  ec.classList.toggle('show',te>0);
  wc.textContent=`${tw} warning${tw!==1?'s':''}`;
  wc.classList.toggle('show',tw>0);
}

function gotoLine(ln){
  const cm=G.cms[G.active];if(!cm)return;
  cm.setCursor(ln,0);
  cm.scrollIntoView({line:ln,ch:0},100);
  cm.focus();
}

function renderTree(){
  const tree=qs('#ftree');tree.innerHTML='';
  Object.values(G.folders).forEach(folder=>{
    const fi=document.createElement('div');fi.className='fold-item';
    const lbl=document.createElement('div');
    lbl.className='fold-lbl'+(folder.open?' open':'');
    lbl.innerHTML=`<i class="carrow">▶</i>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="#f59e0b" opacity=".85"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <span>${folder.name}</span>`;
    lbl.onclick=()=>{folder.open=!folder.open;renderTree();saveData();};
    lbl.oncontextmenu=e=>{e.preventDefault();showFolderCtx(e,folder.id);};
    fi.appendChild(lbl);
    const ch=document.createElement('div');
    ch.className='fold-kids'+(folder.open?' open':'');
    Object.values(G.files).filter(f=>f.folder===folder.id).forEach(f=>ch.appendChild(mkFI(f)));
    fi.appendChild(ch);tree.appendChild(fi);
  });
  Object.values(G.files).filter(f=>!f.folder).forEach(f=>tree.appendChild(mkFI(f)));
}
function mkFI(f){
  const el=document.createElement('div');
  el.className='fi'+(f.id===G.active?' act':'');
  el.innerHTML=`<span class="fdot" style="background:${CLR(f.name)}"></span>
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span>
    <div class="facts">
      <button class="fabt" title="Rename" onclick="renFModal('${f.id}',event)">✏</button>
      <button class="fabt" title="Download" onclick="dlFile('${f.id}',event)">⬇</button>
      <button class="fabt" title="Delete" onclick="delFile('${f.id}',event)" style="color:var(--red)">✕</button>
    </div>`;
  el.onclick=()=>openTab(f.id);
  el.oncontextmenu=e=>{e.preventDefault();showFileCtx(e,f.id);};
  return el;
}

function showFileCtx(e,id){
  const m=qs('#ctxmenu');
  m.innerHTML=`
    <div class="cxi" onclick="openTab('${id}');closeAllMenus()">📂 Open</div>
    <div class="cxi" onclick="renFModal('${id}');closeAllMenus()">✏️ Rename</div>
    <div class="cxi" onclick="movFModal('${id}');closeAllMenus()">📁 Move to Folder</div>
    <div class="cxsep"></div>
    <div class="cxi" onclick="dlFile('${id}');closeAllMenus()">⬇️ Download</div>
    <div class="cxsep"></div>
    <div class="cxi danger" onclick="delFile('${id}');closeAllMenus()">🗑️ Delete</div>`;
  posMenu(e,m);
}
function showFolderCtx(e,id){
  const m=qs('#ctxmenu');
  m.innerHTML=`
    <div class="cxi" onclick="newFileModal('${id}');closeAllMenus()">➕ New File Here</div>

}

let _mr=null;

function closeModal(){qs('#movly').classList.add('hide');if(_mr){_mr(null);_mr=null;}}

async function newFileModal(folderId=null){

  if(!r||!r.val)return;
  let name=r.val;if(!name.includes('.'))name+='.html';
  const id=mkFile(name,defContent(name),typeof folderId==='string'?folderId:null);
  renderTree();openTab(id);showToast(`✅ Created ${name}`);
  saveData();
}
async function newFolderModal(){
  const r=await openModal('New Folder','folder-name','Create');
  if(!r||!r.val)return;
  mkFolder(r.val);renderTree();showToast(`📁 Folder '${r.val}' created`);
  saveData();
}
async function renFModal(id,e){
  if(e)e.stopPropagation();
  const f=G.files[id];if(!f)return;
  const r=await openModal('Rename File',f.name,'Rename');
  if(!r||!r.val||r.val===f.name)return;
  f.name=r.val;renderTree();renderTabs();updateSB();showToast(`✏️ Renamed to ${r.val}`);
  saveData();
}
async function renFolderModal(id){
  const folder=G.folders[id];if(!folder)return;
  const r=await openModal('Rename Folder',folder.name,'Rename');
  if(!r||!r.val)return;
  folder.name=r.val;renderTree();showToast(`✏️ Renamed to ${r.val}`);
  saveData();
}
async function movFModal(id){
  const r=await openModal('Move File','','Move',Object.values(G.folders));
  if(!r)return;
  G.files[id].folder=r.sel||null;renderTree();showToast('📁 File moved');

}
function delFile(id,e){
  if(e)e.stopPropagation();
  const f=G.files[id];if(!f)return;
  if(!confirm(`Delete "${f.name}"?`))return;
  closeTab(id);
  if(G.blobUrls[id]){URL.revokeObjectURL(G.blobUrls[id]);delete G.blobUrls[id];}
  delete G.files[id];delete G.errs[id];
  renderTree();renderTabs();showToast(`🗑️ Deleted ${f.name}`);
  saveData();
}
function delFolder(id){
  const folder=G.folders[id];if(!folder)return;
  if(!confirm(`Delete folder "${folder.name}" and all files?`))return;
  Object.values(G.files).filter(f=>f.folder===id).forEach(f=>{closeTab(f.id);delete G.files[f.id];delete G.errs[f.id];});
  delete G.folders[id];renderTree();showToast('🗑️ Folder deleted');
  saveData();
}

function importFiles(){qs('#fimp').click();}
function handleImport(input){
  const files=Array.from(input.files);let count=0;
  const proc=i=>{
    if(i>=files.length){
      renderTree();
      if(count)showToast(`✅ Imported ${count} file(s)`);
      input.value='';
      saveData();
      return;
    }
    const file=files[i],reader=new FileReader();
    if(IMED(file.name)){
      reader.readAsDataURL(file);
      reader.onload=()=>{mkFile(file.name,'',null,file,reader.result);count++;proc(i+1);};
    } else {
      reader.readAsText(file);
      reader.onload=()=>{const id=mkFile(file.name,reader.result);if(count===0)openTab(id);count++;proc(i+1);};
    }
  };proc(0);
}
function dlCurrent(){if(!G.active)return showToast('No file open');dlFile(G.active);}
function dlFile(id,e){
  if(e)e.stopPropagation();
  const f=G.files[id];if(!f)return;
  if(f.isMedia){
    const src=G.blobUrls[id]||f.du;if(!src)return;
    const a=document.createElement('a');a.href=src;a.download=f.name;a.click();
  } else {
    const url=URL.createObjectURL(new Blob([f.content],{type:'text/plain'}));
    const a=document.createElement('a');a.href=url;a.download=f.name;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }
  showToast(`⬇️ Downloading ${f.name}`);
}

function buildHTML(){
  const hf=Object.values(G.files).filter(f=>['html','htm'].includes(f.type));
  const cf=Object.values(G.files).filter(f=>f.type==='css');
  const jf=Object.values(G.files).filter(f=>['js','ts'].includes(f.type));
  const media={};
  Object.values(G.files).filter(f=>f.isMedia).forEach(f=>{media[f.name]=G.blobUrls[f.id]||f.du||'';});

  let html=hf.length?hf[0].content
    :`<!DOCTYPE html><html><head><meta charset="UTF-8">${cf.map(f=>`<style>${f.content}</style>`).join('')}</head><body>${jf.map(f=>`<script>${f.content}<\/script>`).join('')}</body></html>`;

  cf.forEach(f=>{html=html.replace(new RegExp(`<link[^>]*href=["']${RE(f.name)}["'][^>]*>`,'gi'),`<style>/* ${f.name} */\n${f.content}</style>`);});
  jf.forEach(f=>{html=html.replace(new RegExp(`<script[^>]*src=["']${RE(f.name)}["'][^>]*><\\/script>`,'gi'),`<script>/* ${f.name} */\n${f.content}<\/script>`);});
  Object.entries(media).forEach(([n,s])=>{if(s)html=html.replace(new RegExp(RE(n),'g'),s);});

  const errInject=`<script>
(function(){
  var orig=window.onerror;
  window.onerror=function(m,s,l,c,err){
    document.documentElement.style.outline='2px solid #ef4444';
    return false;
  };
})();
<\/script>`;
  html=html.includes('</head>')?html.replace('</head>',errInject+'</head>'):errInject+html;
  return html;
}

function sched(){clearTimeout(G.runTmr);if(!G.autoRun)return;G.runTmr=setTimeout(runCode,550);}

  clearTimeout(G.runTmr);

function updatePCScale() {
  const wrap = qs('#pvwrap');
  const pcfw = qs('#pcfw');
  if (!wrap || !pcfw || G.pvMode !== 'pc') return;
  const ww = wrap.clientWidth;
  const wh = wrap.clientHeight;
  const targetW = 1024; // Real PC baseline width
  
  if (ww > 0 && ww < targetW) {
    const scale = ww / targetW;
    pcfw.style.width = targetW + 'px';
    pcfw.style.height = (wh / scale) + 'px';
    pcfw.style.transform = `scale(${scale})`;
    pcfw.style.transformOrigin = '0 0';
  } else {
    pcfw.style.width = '100%';
    pcfw.style.height = '100%';
    pcfw.style.transform = 'none';
  }
}

function updateFSPCScale() {
  const body = qs('#fsbody');
  const iframe = qs('#fs-iframe');
  if (!body || !iframe || G.fsMode !== 'pc') return;
  const ww = body.clientWidth;
  const wh = body.clientHeight;
  const targetW = 1024;

  if (ww > 0 && ww < targetW) {
    const scale = ww / targetW;
    iframe.style.width = targetW + 'px';
    iframe.style.height = (wh / scale) + 'px';
    iframe.style.transform = `scale(${scale})`;
    iframe.style.transformOrigin = '0 0';
  } else {
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.transform = 'none';
  }
}

// Setup automated resizing observations
const resizeObserver = new ResizeObserver(() => {

(function(){
  const h=qs('#dh'),ep=qs('#edpane'),pv=qs('#pvpane');
  let drag=false,sx,sew,spw;
  h.addEventListener('mousedown',e=>{drag=true;h.classList.add('drag');sx=e.clientX;sew=ep.getBoundingClientRect().width;spw=pv.getBoundingClientRect().width;document.body.style.userSelect='none';document.body.style.cursor='col-resize';});
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    const dx=e.clientX-sx,tot=sew+spw;
    const nw=Math.max(150,Math.min(sew+dx,tot-150));
    ep.style.flex='none';ep.style.width=nw+'px';
    pv.style.flex='none';pv.style.width=(tot-nw)+'px';
    if(G.active&&G.cms[G.active])G.cms[G.active].refresh();
  });
  document.addEventListener('mouseup',()=>{if(!drag)return;drag=false;h.classList.remove('drag');document.body.style.userSelect='';document.body.style.cursor='';});
})();

function defContent(name){
  return ({
    html:`<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>Document</title>\n</head>\n<body>\n  \n</body>\n</html>`,
    css:`/* Styles */\n\n`,js:`// JavaScript\n\n`,
    json:`{\n  \n}`,md:`# Title\n\n`
  })[E(name)]||'';
}

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runCode();}
  if((e.ctrlKey||e.metaKey)&&e.key==='n'&&!e.shiftKey){e.preventDefault();newFileModal();}
  if(e.key==='F11'){e.preventDefault();openFS();}
  if(e.key==='Escape'){
    if(qs('#fsov').classList.contains('on'))closeFS();
    closeAllMenus();closeModal();
  }
});

function saveData() {
  const s = { files: {}, folders: G.folders, tabs: G.tabs, active: G.active };
  Object.values(G.files).forEach(f => {
    s.files[f.id] = { id: f.id, name: f.name, content: f.content, type: f.type, folder: f.folder, isMedia: f.isMedia, du: f.du };
  });
  try { localStorage.setItem('codeforge_data', JSON.stringify(s)); } 
  catch(e) { if(e.name === 'QuotaExceededError') showToast('⚠️ Storage quota exceeded!'); }
}

function loadData() {
  try {
    const raw = localStorage.getItem('codeforge_data');
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data.files || Object.keys(data.files).length === 0) return false;

    G.folders = data.folders || {};
    G.tabs =[];
    G.active = null;

    Object.values(data.files).forEach(f => {
      G.files[f.id] = f;
      G.errs[f.id] = {errors:0, warnings:0};
      if(f.isMedia && f.du) {
        fetch(f.du).then(r=>r.blob()).then(b=>{
          G.blobUrls[f.id] = URL.createObjectURL(b);
          if(G.active === f.id) setActive(f.id);
        }).catch(()=>{});
      }
    });

    const loadedTabs = data.tabs ||[];
    loadedTabs.forEach(id => { if(G.files[id]) G.tabs.push(id); });
    
    let active = data.active;
    if(active && G.files[active]) setActive(active);
    else if(G.tabs.length > 0) setActive(G.tabs[0]);

    return true;
  } catch(e) {
    console.error('Failed to load data', e);
    return false;
  }
}
